<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>transauto — Sistema de Ponto Eletrônico</title>
<!-- ===== PWA / App ===== -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#123a8f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ponto transauto">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
<!-- ===== Banco de dados na nuvem (Firebase) — sincroniza os dados entre todos os aparelhos ===== -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
/* ============================ TEMA / PALETA ============================ */
:root{
  /* Paleta em homenagem à bandeira do Espírito Santo: azul e rosa */
  --blue:#2f7ad1; --blue-600:#2467b5; --green:#10B981; --green-600:#059669;
  --pink:#e7649e; --pink-600:#d5488a; --babyblue:#8ecbf2; --babyblue-soft:#eaf4fd; --pink-soft:#fdecf4;
  --surface-1:#ffffff; --surface-2:#eef4fc; --page:#e7f0fb;
  --text-1:#0b0f19; --text-2:#52596b; --muted:#8a90a2;
  --grid:#e6e8ee; --border:rgba(11,15,25,.10); --ring:rgba(47,122,209,.35);
  --s-good:#0ca30c; --s-warn:#fab219; --s-serious:#ec835a; --s-crit:#d03b3b;
  --c1:#2f7ad1; --c2:#1baf7a; --c3:#eda100; --c4:#7d5fd0; --c5:#e7649e; --c6:#eb6834;
  --shadow:0 1px 2px rgba(11,15,25,.04),0 8px 24px rgba(11,15,25,.06);
  --radius:16px;
  --logo-ink:#123a8f;
}
html[data-theme="dark"]{
  --blue:#3f8ee6; --blue-600:#2f7ad1; --pink:#ec7bad; --pink-600:#e7649e; --babyblue:#8ecbf2; --babyblue-soft:#16303f; --pink-soft:#3a1f2c;
  --surface-1:#16181d; --surface-2:#1d2026; --page:#0d0e11;
  --text-1:#f4f5f7; --text-2:#b7bcc9; --muted:#8a90a2;
  --grid:#2a2d34; --border:rgba(255,255,255,.10); --ring:rgba(63,142,230,.45);
  --c1:#3f8ee6; --c2:#199e70; --c3:#c98500; --c4:#9a83e6; --c5:#ec7bad; --c6:#d95926;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.4);
  --logo-ink:#5c93ec;
}
.tlogo{height:38px;width:auto;display:block}
.brand-logo .tlogo{height:54px}
.side-brand .tlogo{height:28px}
.logo-emblem{width:38px;height:38px;border-radius:11px;flex:0 0 38px;display:grid;place-items:center;
  background:linear-gradient(135deg,#123a8f,#0d2c6f);box-shadow:0 6px 16px rgba(18,58,143,.32)}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--page); color:var(--text-1);
  -webkit-font-smoothing:antialiased; transition:background .3s,color .3s;
}
button{font-family:inherit;cursor:pointer}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--grid);border-radius:8px}

/* ============================ LOGIN ============================ */
#login{position:fixed;inset:0;display:grid;place-items:center;
  background:radial-gradient(1200px 700px at 20% -10%,rgba(47,122,209,.24),transparent),
             radial-gradient(1000px 600px at 100% 110%,rgba(142,203,242,.26),transparent),var(--page);
  z-index:50;padding:20px}
.login-card{width:100%;max-width:420px;background:var(--surface-1);border:1px solid var(--border);
  border-radius:24px;box-shadow:var(--shadow);padding:34px 30px;animation:pop .5s cubic-bezier(.2,.9,.3,1.2)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--babyblue),var(--blue-600));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;box-shadow:0 6px 16px rgba(47,122,209,.34),inset 0 1px 0 rgba(255,255,255,.3)}
.brand h1{font-size:22px;margin:0}
.brand small{color:var(--muted)}
.field{margin-top:16px}
.field label{display:block;font-size:13px;color:var(--text-2);margin-bottom:6px;font-weight:600}
.input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-1);font-size:15px;outline:none;transition:.2s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--ring)}
/* Botões 3D (degradê azul, relevo e elevação) */
.btn{border:none;border-radius:12px;padding:12px 16px;font-weight:700;font-size:15px;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .15s,box-shadow .15s,filter .15s;color:#fff}
.btn.primary{background:linear-gradient(135deg,var(--babyblue),var(--blue) 42%,var(--blue-600));
  box-shadow:0 6px 16px rgba(47,122,209,.34),inset 0 1px 0 rgba(255,255,255,.28)}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(47,122,209,.45),inset 0 1px 0 rgba(255,255,255,.28)}
.btn.primary:active{transform:translateY(0)}
.btn.block{width:100%}
.btn.ghost{background:var(--surface-1);color:var(--text-1);border:1px solid var(--border);box-shadow:0 2px 5px rgba(11,15,25,.07)}
.btn.ghost:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 14px rgba(11,15,25,.1)}
.btn.green{background:linear-gradient(135deg,#3ed6a4,var(--green) 45%,var(--green-600));box-shadow:0 6px 16px rgba(16,185,129,.32),inset 0 1px 0 rgba(255,255,255,.28)}
.btn.green:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(16,185,129,.42)}
.btn.pink{background:linear-gradient(135deg,#f59bc4,var(--pink) 45%,var(--pink-600));box-shadow:0 6px 16px rgba(231,100,158,.32),inset 0 1px 0 rgba(255,255,255,.28)}
.btn.pink:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(231,100,158,.42)}
.btn.danger{background:linear-gradient(135deg,#e46a6a,var(--s-crit));box-shadow:0 6px 16px rgba(208,59,59,.32),inset 0 1px 0 rgba(255,255,255,.22)}
.btn.danger:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(208,59,59,.42)}
.btn:active{filter:brightness(.97)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:9px;box-shadow:0 3px 8px rgba(47,122,209,.22),inset 0 1px 0 rgba(255,255,255,.25)}
.btn.sm.ghost{box-shadow:0 2px 5px rgba(11,15,25,.07)}
/* Abas segmentadas (Registros / Acompanhar) */
.segbar{display:inline-flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;flex-wrap:wrap}
.segbtn{border:none;background:transparent;color:var(--text-2);font-weight:700;font-size:14px;padding:9px 16px;border-radius:9px;transition:.15s}
.segbtn:hover{color:var(--text-1)}
.segbtn.active{background:var(--surface-1);color:var(--blue);box-shadow:0 1px 2px rgba(11,15,25,.08)}
/* Lista de colaboradores no Acompanhar do Admin */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:14px}
.emp-pick{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface-2);color:var(--text-1);font:inherit;text-align:left;transition:.15s}
.emp-pick:hover{border-color:var(--pink);background:var(--surface-1)}
.emp-pick-arrow{margin-left:auto;color:var(--muted);font-size:20px;font-weight:700}
.demo{margin-top:18px;padding-top:16px;border-top:1px dashed var(--border);display:grid;gap:8px}
.demo p{margin:0 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.demo-btn{display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-1);text-align:left;width:100%}
.demo-btn:hover{border-color:var(--blue)}
.demo-btn .av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:700}

/* ============================ APP SHELL ============================ */
#app{display:none;min-height:100vh}
.layout{display:grid;grid-template-columns:266px 1fr;min-height:100vh;transition:grid-template-columns .25s}
.layout.collapsed{grid-template-columns:74px 1fr}
.sidebar{background:var(--surface-1);border-right:1px solid var(--border);padding:16px 12px;
  position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.side-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.side-brand .logo{width:36px;height:36px;font-size:16px;border-radius:10px}
.side-brand span{font-weight:800;font-size:17px;white-space:nowrap;overflow:hidden}
.nav-i{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:var(--text-2);
  font-weight:600;font-size:14px;border:none;background:none;width:100%;text-align:left;white-space:nowrap}
.nav-i:hover{background:var(--surface-2);color:var(--text-1)}
.nav-i.active{background:linear-gradient(135deg,rgba(47,122,209,.18),rgba(142,203,242,.14));color:var(--blue);box-shadow:inset 3px 0 0 var(--blue)}
.nav-i .ic{width:22px;text-align:center;font-size:17px;flex:0 0 22px}
.nav-i>span:not(.ic):not(.badge){flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-badge{flex:0 0 auto}
.layout.collapsed .side-brand span,.layout.collapsed .nav-i span,.layout.collapsed .nav-sec{display:none}
.nav-sec{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:14px 12px 4px}
.nav-badge{animation:navpulse 1.7s ease-in-out infinite;padding:3px 8px;font-size:11px;margin-left:8px}
@keyframes navpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.layout.collapsed .nav-badge{margin-left:0 !important;position:absolute;top:4px;right:4px;min-width:16px;height:16px;padding:0 3px;font-size:10px}
.layout.collapsed .nav-i{position:relative}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 22px;background:color-mix(in srgb,var(--surface-1) 85%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--surface-2);
  color:var(--text-1);display:grid;place-items:center;font-size:17px}
.icon-btn:hover{border-color:var(--blue)}
.searchbar{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:12px;padding:9px 12px;color:var(--muted)}
.searchbar input{border:none;background:none;outline:none;color:var(--text-1);width:100%;font-size:14px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.clock{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;color:var(--text-1);
  background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:8px 12px}
.clock small{color:var(--muted);font-weight:600;font-size:11px;display:block}
.avatar{width:40px;height:40px;border-radius:12px;object-fit:cover;border:2px solid var(--border);background:var(--surface-2)}
.user-chip{display:flex;align-items:center;gap:10px;padding:5px 10px 5px 6px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2)}
.user-chip b{font-size:13px;display:block}
.user-chip small{font-size:11px;color:var(--muted)}
.notif{position:relative}
.notif .dot{position:absolute;top:0;right:0;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--s-crit);
  border:2px solid var(--surface-1);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;line-height:1}

.content{padding:22px;max-width:1280px;width:100%;margin:0 auto}
.page{display:none;animation:fade .35s}
.page.show{display:block}
.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h2{margin:0;font-size:24px}
.page-head p{margin:2px 0 0;color:var(--muted);font-size:14px}
.page-head .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

/* ============================ CARDS / GRID ============================ */
.grid{display:grid;gap:16px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px}
.card h3{margin:0 0 4px;font-size:15px}
.card .sub{color:var(--muted);font-size:12.5px;margin-bottom:12px}
.kpi{display:flex;flex-direction:column;gap:8px}
.kpi .top{display:flex;align-items:center;justify-content:space-between}
.kpi .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;color:#fff}
.kpi .val{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.kpi .lbl{color:var(--text-2);font-size:13px;font-weight:600}
.kpi .delta{font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-flex;gap:4px;align-items:center}
.up{color:var(--s-good);background:rgba(12,163,12,.12)}
.down{color:var(--s-crit);background:rgba(208,59,59,.12)}

.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.b-good{color:var(--s-good);background:rgba(12,163,12,.13)}
.b-warn{color:#a06a00;background:rgba(250,178,25,.18)}
.b-crit{color:var(--s-crit);background:rgba(208,59,59,.13)}
.b-info{color:var(--blue);background:rgba(37,99,235,.13)}
.b-mut{color:var(--text-2);background:var(--surface-2)}
html[data-theme="dark"] .b-warn{color:#fab219}

/* ============================ TABELA ============================ */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;
  letter-spacing:.4px;padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text-1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
.tavatar{width:30px;height:30px;border-radius:9px;object-fit:cover;background:var(--surface-2)}
.uname{display:flex;align-items:center;gap:10px}
.uname b{font-size:13.5px}.uname small{color:var(--muted);font-size:11.5px;display:block}
.tbl-wrap{overflow-x:auto}

/* ============================ REGISTRO DE PONTO ============================ */
.punch-hero{background:linear-gradient(135deg,rgba(47,122,209,.16),rgba(142,203,242,.12));
  border:1px solid var(--border);border-radius:22px;padding:26px;display:grid;
  grid-template-columns:1.1fr 1fr;gap:26px;align-items:center}
.punch-clock{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.punch-date{color:var(--text-2);font-size:15px;text-transform:capitalize;margin-top:2px}
.next-badge{margin-top:16px;display:inline-flex;align-items:center;gap:10px;background:var(--surface-1);
  border:1px solid var(--border);border-radius:14px;padding:10px 16px;font-weight:700}
.next-badge .pill{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.2)}
.punch-btn{width:100%;aspect-ratio:1/.62;border:none;border-radius:20px;color:#fff;font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--babyblue),var(--blue) 45%,var(--blue-600));
  box-shadow:0 14px 34px rgba(47,122,209,.4),inset 0 2px 0 rgba(255,255,255,.28);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.punch-btn:hover{transform:translateY(-2px);box-shadow:0 20px 48px rgba(47,122,209,.5),inset 0 2px 0 rgba(255,255,255,.28)}
.punch-btn:active{transform:scale(.98)}
.punch-btn .big{font-size:40px}
.punch-btn.done{background:linear-gradient(135deg,#7c8ba1,#475569);box-shadow:none}
.timeline{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.tl-step{flex:1;min-width:120px;background:var(--surface-1);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
.tl-step.filled{border-color:var(--green);background:linear-gradient(135deg,rgba(16,185,129,.10),transparent)}
.tl-step .k{font-size:12px;color:var(--muted);font-weight:600}
.tl-step .t{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
.tl-step.filled .t{color:var(--green-600)}
html[data-theme="dark"] .tl-step.filled .t{color:var(--green)}

/* progress ring */
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:12;stroke-linecap:round}
.ring .bg{stroke:var(--grid)}
.ring .fg{stroke:var(--green);transition:stroke-dashoffset 1s ease}

/* ============================ MODAL ============================ */
.overlay{position:fixed;inset:0;background:rgba(6,8,15,.55);backdrop-filter:blur(3px);
  z-index:60;display:none;place-items:center;padding:20px}
.overlay.show{display:grid;animation:fade .2s}
.modal{background:var(--surface-1);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);
  width:100%;max-width:520px;max-height:90vh;overflow:auto;animation:pop .3s cubic-bezier(.2,.9,.3,1.2)}
.modal.wide{max-width:760px}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h3{margin:0;font-size:18px}
.modal-body{padding:20px 22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
textarea.input{resize:vertical;min-height:80px}
select.input{appearance:none}

/* toast */
#toasts{position:fixed;top:18px;right:18px;z-index:80;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface-1);border:1px solid var(--border);border-left:4px solid var(--green);
  border-radius:12px;box-shadow:var(--shadow);padding:12px 16px;min-width:260px;display:flex;gap:10px;align-items:center;
  animation:slidein .3s}
.toast.err{border-left-color:var(--s-crit)}
.toast.info{border-left-color:var(--blue)}
.toast b{font-size:13.5px}.toast small{color:var(--muted);font-size:12px;display:block}

/* success animation */
#success{position:fixed;inset:0;z-index:90;display:none;place-items:center;background:rgba(6,8,15,.5);backdrop-filter:blur(4px)}
#success.show{display:grid}
.success-card{background:var(--surface-1);border-radius:24px;padding:40px 46px;text-align:center;box-shadow:var(--shadow);animation:pop .4s}
.check{width:96px;height:96px;margin:0 auto 14px}
.check circle{fill:none;stroke:var(--green);stroke-width:6;stroke-dasharray:283;stroke-dashoffset:283;animation:draw .5s .1s forwards}
.check path{fill:none;stroke:var(--green);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:60;stroke-dashoffset:60;animation:draw .4s .5s forwards}
.success-card h3{margin:6px 0 2px;font-size:22px}
.success-card p{margin:0;color:var(--muted)}

/* misc */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface-1);
  font-size:13px;font-weight:600;color:var(--text-2)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.map{height:150px;border-radius:14px;border:1px solid var(--border);background:
  linear-gradient(0deg,var(--grid) 1px,transparent 1px) 0 0/26px 26px,
  linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/26px 26px,var(--surface-2);
  position:relative;overflow:hidden}
.map .pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);font-size:30px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.map .acc{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;

<script>
/* ============================ ESTADO / DADOS MOCK ============================ */
const AV = (bg,txt)=>`data:image/svg+xml;utf8,`+encodeURIComponent(

const state = {
  theme:'light', role:null, user:null, page:'dashboard', collapsed:false,
  punchesByEmp:{}, // por funcionário -> por data: {entrada,saida}
  employees:[],      // cadastrados pelo administrador
  adjustments:[],
  logs:[],
  holidays:[
    {data:'2026-07-09',nome:'Rev. Constitucionalista (SP)',tipo:'Estadual'},

    {data:'2026-11-15',nome:'Proclamação da República',tipo:'Nacional'},
    {data:'2026-12-25',nome:'Natal',tipo:'Nacional'},
  ],
  vacations:[],
  afastamentos:[],
  escalas:[
    {nome:'5x2',desc:'Segunda a sexta',h:'08:00 – 17:00',a:'1h almoço',c:'var(--c1)',n:0},
    {nome:'6x1',desc:'Seis dias, folga 1',h:'10:00 – 19:00',a:'1h almoço',c:'var(--c2)',n:0},
    {nome:'12x36',desc:'12h trabalho / 36h folga',h:'07:00 – 19:00',a:'1h almoço',c:'var(--c4)',n:0},
    {nome:'Personalizada',desc:'Configurável por dia',h:'Variável',a:'—',c:'var(--c3)',n:0},
  ],
  folha:[],
  notifications:[],
  registros:[],
  folhaFechada:false,
  closedPeriods:{}, // nome do colaborador -> lista de períodos fechados (chave AAAA-MM do início)
  fechamentos:[], // fechamentos de ponto feitos pelos colaboradores (o Admin vê aqui)
  config:{liberarDomingo:false,liberarFeriado:false}, // liberações de registro definidas pelo Admin
  lastGeo:null,
};

const SCHED = ['entrada','saida'];
const SCHED_LABEL={entrada:'Entrada',saida:'Saída'};
const todayKey=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};

/* ==================================================================== */
/* ===== PERSISTÊNCIA / BANCO DE DADOS NA NUVEM (Firebase) ============ */
/* ==================================================================== */
/* >>> COLE AQUI a configuração do projeto Firebase (o administrador cria — é grátis).
   Enquanto estiver vazia, o sistema funciona salvando SÓ neste aparelho (não sincroniza
   entre celulares). Assim que a configuração for colada, os cadastros do Admin passam a
   aparecer em qualquer aparelho. */
const firebaseConfig = {
  apiKey: "AIzaSyCeV2b3tntXgGTpQdk8LOMy787zebZZAGY",
  authDomain: "ponto-cariacicaes.firebaseapp.com",
  projectId: "ponto-cariacicaes",
  storageBucket: "ponto-cariacicaes.firebasestorage.app",
  messagingSenderId: "859559207223",
  appId: "1:859559207223:web:9f2d734f2fcf412e8b3ab2"
};

const PERSIST_KEYS=['employees','adjustments','logs','holidays','vacations','afastamentos','escalas','folha','notifications','registros','closedPeriods','fechamentos','punchesByEmp','config'];
let db=null, cloudReady=false, sessionReady=false, cloudLoaded=false, applyingRemote=false, saveTimer=null, lastPushed='';

function stableJSON(src){const o={};PERSIST_KEYS.forEach(k=>o[k]=src?src[k]:undefined);return JSON.stringify(o);}
function persistSlice(){const o={};PERSIST_KEYS.forEach(k=>o[k]=state[k]);return o;}
function trimGrowth(){
  if(state.logs&&state.logs.length>500)state.logs=state.logs.slice(0,500);
  if(state.notifications&&state.notifications.length>250)state.notifications=state.notifications.slice(-250);
}
function scheduleSave(){
  if(!sessionReady||applyingRemote)return;
  clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,500);
}
function saveNow(){
  trimGrowth();
  const data=persistSlice();
  const js=stableJSON(data);
  if(js===lastPushed)return;
  lastPushed=js;
  try{localStorage.setItem('pontoapp_v2',js);}catch(e){}
  // Só grava na nuvem DEPOIS de ter carregado os dados do servidor, para nunca
  // sobrescrever os cadastros existentes com um estado vazio ao atualizar/abrir o sistema.
  if(cloudReady&&cloudLoaded&&db){
    try{db.collection('pontoapp').doc('dados').set(JSON.parse(JSON.stringify(data)))
      .catch(e=>console.warn('Falha ao salvar na nuvem:',e&&e.message));}catch(e){}
  }
}
function applyRemote(data){
  applyingRemote=true;
  PERSIST_KEYS.forEach(k=>{if(data[k]!==undefined)state[k]=data[k];});
  applyingRemote=false;
}
function refreshUI(){
  if(state.role&&state.user){renderNav();render();updateNotifBadge();}
}
function loadLocal(){
  try{const raw=localStorage.getItem('pontoapp_v2');if(raw){applyRemote(JSON.parse(raw));lastPushed=stableJSON(state);}}catch(e){}
}
function initPersistence(){
  try{
    if(typeof firebase!=='undefined'&&firebaseConfig&&firebaseConfig.apiKey){
      firebase.initializeApp(firebaseConfig);
      db=firebase.firestore();
      cloudReady=true;
    }
  }catch(e){console.warn('Firebase indisponível — usando armazenamento local.',e&&e.message);cloudReady=false;}

  // Reconecta o administrador na hora (não depende dos dados do servidor)
  try{const s=readSession();if(s&&s.role==='admin')restoreSession();}catch(e){}

  if(!cloudReady){loadLocal();sessionReady=true;restoreSession();return;}

  const startSync=()=>{
    db.collection('pontoapp').doc('dados').onSnapshot(snap=>{
      if(!snap.exists){cloudLoaded=true;sessionReady=true;restoreSession();saveNow();return;}
      const incoming=snap.data();
      const js=stableJSON(incoming);
      if(js!==lastPushed){
        applyRemote(incoming);
        lastPushed=js;
      }
      cloudLoaded=true;sessionReady=true;restoreSession();refreshUI();
    },err=>{
      console.warn('Erro de sincronização:',err&&err.message);
      if(!sessionReady){loadLocal();sessionReady=true;restoreSession();refreshUI();toast('Modo local','Sem conexão com o servidor no momento.','info');}
    });
  };
  try{
    firebase.auth().signInAnonymously().then(startSync).catch(e=>{console.warn('Login anônimo falhou:',e&&e.message);startSync();});
  }catch(e){startSync();}

  // Rede de segurança: se o servidor não responder, cai para o modo local
  setTimeout(()=>{if(!sessionReady){console.warn('Sem resposta do servidor — modo local.');loadLocal();sessionReady=true;restoreSession();refreshUI();}},8000);
}

/* ===== Pontos por funcionário (cada colaborador tem sua própria jornada) ===== */
function empStore(id){if(id==null)return {};if(!state.punchesByEmp[id])state.punchesByEmp[id]={};return state.punchesByEmp[id];}
function myDayObj(){const id=state.user&&state.user.id;const st=empStore(id);return st[todayKey()]||{};}
function myDayEnsure(){const id=state.user&&state.user.id;const st=empStore(id);if(!st[todayKey()])st[todayKey()]={};return st[todayKey()];}

/* ============================ JORNADA / HORA EXTRA ============================ */
function parseHM(hm){const [h,m]=hm.split(':').map(Number);const d=new Date();d.setHours(h,m,0,0);return d;}
function fmtMin(m){m=Math.max(0,Math.round(m));const h=Math.floor(m/60),mm=m%60;return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
// Jornada cadastrada do funcionário (viria do cadastro). Ex.: 08:00–17:00
function jornadaInfo(){
  const u=state.user||{};
  const dow=new Date().getDay();
  const isSat=dow===6;   // sábado usa a jornada reduzida
  const isDescanso=dow===0||!!feriadoDe(todayKey());   // domingo/feriado: tudo é hora extra
  const j=(isSat&&u.jornadaSab)?u.jornadaSab:(u.jornada||'08:00–17:00');
  const [ini,fim]=j.split(/[–-]/).map(s=>s.trim());
  const t=myDayObj();
  const previstaMin=isDescanso?0:(parseHM(fim)-parseHM(ini))/60000;
  let trabMin=0,emAndamento=false;
  if(t.entrada){
    const start=parseHM(t.entrada.time);
    const end=t.saida?parseHM(t.saida.time):new Date();
    emAndamento=!t.saida;
    trabMin=Math.max(0,(end-start)/60000);
  }
  const extraMin=Math.max(0,trabMin-previstaMin);       // hora extra: passou da jornada
  const restanteMin=Math.max(0,previstaMin-trabMin);
  const pct=previstaMin?Math.min(100,Math.round(trabMin/previstaMin*100)):0;
  return {ini,fim,previstaMin,trabMin,extraMin,restanteMin,pct,emAndamento,temEntrada:!!t.entrada,temSaida:!!t.saida};
}
// Atualiza os números da jornada em tempo real (chamado no tick)
function updateJornadaLive(){
  if(state.role!=='colab'||state.page!=='dashboard')return;
  const el=id=>document.getElementById(id);
  if(!el('jExtra'))return;
  const j=jornadaInfo();
  const t=myDayObj();
  el('jExtra').textContent=fmtMin(j.extraMin);
  const jJanta=el('jJanta'); if(jJanta)jJanta.textContent=(t.saida&&t.saida.time>'18:59')?'Sim':'—';
  const jExtraKpi=el('jExtraKpi'); if(jExtraKpi)jExtraKpi.textContent=fmtMin(j.extraMin);
  const jTrab=el('jTrab'); if(jTrab)jTrab.textContent=fmtMin(j.trabMin);
  const jTrabKpi=el('jTrabKpi'); if(jTrabKpi)jTrabKpi.textContent=fmtMin(j.trabMin);
  const jRestante=el('jRestante'); if(jRestante)jRestante.textContent=fmtMin(j.restanteMin);
  const jPct=el('jPct'); if(jPct)jPct.textContent=j.pct+'%';
  const wrap=el('jExtraWrap');
  if(wrap)wrap.style.display=j.extraMin>0?'flex':'none';
  const ring=el('jRing');
  if(ring){const r=+ring.getAttribute('r'),c=2*Math.PI*r;ring.style.strokeDasharray=c;ring.style.strokeDashoffset=c*(1-j.pct/100);
    ring.setAttribute('stroke',j.extraMin>0?'var(--s-warn)':'var(--c2)');}
  const st=el('jStatus');
  if(st){
    if(!j.temEntrada)st.innerHTML='<span class="pill" style="background:var(--muted)"></span> Aguardando registro de entrada';
    else if(j.emAndamento&&j.extraMin>0)st.innerHTML='<span class="pill" style="background:var(--s-warn)"></span> Em hora extra — '+fmtMin(j.extraMin)+' além da jornada';
    else if(j.emAndamento)st.innerHTML='<span class="pill"></span> Jornada em andamento';
    else st.innerHTML='<span class="pill" style="background:var(--s-good)"></span> Jornada encerrada';
  }
}

function renderNav(){
  const nav=document.getElementById('nav');
  const counts={
    pend:state.adjustments.filter(a=>a.status==='pendente').length,
    ferias:state.vacations.filter(v=>v.status==='pendente').length,
    fechamentos:(state.fechamentos||[]).filter(f=>!f.seen).length,
  };
  nav.innerHTML=NAV[state.role].map(i=>{
    if(i.sec)return `<div class="nav-sec">${i.sec}</div>`;
    const n=i.badge?counts[i.badge]:0;
    const badge=n?`<span class="badge ${i.badgeColor||'b-crit'} nav-badge" style="margin-left:auto">${n}</span>`:'';
    return `<button class="nav-i ${state.page===i.id?'active':''}" onclick="go('${i.id}')">
      <span class="ic">${i.ic}</span><span>${i.t}</span>${badge}</button>`;
  }).join('');
}

const BOTTOM={
  admin:[
    {id:'dashboard',ic:'📊',t:'Início'},

let restoringSession=false;
function readSession(){try{return JSON.parse(localStorage.getItem('pontoapp_session')||'null');}catch(e){return null;}}
function saveSession(){
  try{
    let s=null;
    if(state.role==='admin')s={role:'admin'};
    else if(state.role==='colab'&&state.user)s={role:'colab',id:state.user.id,email:state.user.email};
    if(s){s.page=state.page;if(state.acompMonth)s.acompMonth=state.acompMonth;localStorage.setItem('pontoapp_session',JSON.stringify(s));}
  }catch(e){}
}
function clearSession(){try{localStorage.removeItem('pontoapp_session');}catch(e){}}
function restoreSession(){
  if(state.role)return;                 // já está logado
  const s=readSession();if(!s)return;
  restoringSession=true;
  try{
    if(s.role==='admin'){loginAdmin();}
    else if(s.role==='colab'){
      const emp=state.employees.find(e=>(s.id!=null&&e.id===s.id)||(s.email&&empLogin(e).toLowerCase()===String(s.email).toLowerCase()));
      if(emp&&emp.status!=='inativo'){loginAsEmployee(emp);}else{clearSession();}
    }
    // Restaura a última tela em que o usuário estava (não volta para o início ao atualizar)
    if(state.role&&s.page){
      const validIds=(NAV[state.role]||[]).filter(i=>i.id).map(i=>i.id);
      if(validIds.includes(s.page)){
        if(s.page==='acompanhar')state.acompMonth=s.acompMonth||ymNow();
        state.page=s.page;renderNav();render();saveSession();
      }
    }
  }finally{restoringSession=false;}
}

/* ============================ GEOLOCALIZAÇÃO ============================ */
function deviceInfo(){
  const ua=navigator.userAgent;
  let os='Desconhecido';
  if(/Windows/.test(ua))os='Windows';else if(/Mac/.test(ua))os='macOS';else if(/Android/.test(ua))os='Android';
  else if(/iPhone|iPad/.test(ua))os='iOS';else if(/Linux/.test(ua))os='Linux';
  let br='Navegador';
  if(/Edg/.test(ua))br='Edge';else if(/Chrome/.test(ua))br='Chrome';else if(/Firefox/.test(ua))br='Firefox';else if(/Safari/.test(ua))br='Safari';
  const dev=/Mobi|Android|iPhone/.test(ua)?'Celular':/iPad|Tablet/.test(ua)?'Tablet':'Desktop';
  return {os,br,dev};
}
function getGeo(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation)return reject('Geolocalização não suportada pelo navegador.');
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const {latitude,longitude,accuracy}=pos.coords;
        let addr='Endereço não disponível',cidade='—',estado='—';
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=pt-BR`,{headers:{'Accept':'application/json'}});
          const j=await r.json(); const a=j.address||{};
          addr=j.display_name||addr;
          cidade=a.city||a.town||a.village||a.municipality||'—';
          estado=a.state||'—';
        }catch(e){/* offline: mantém coords */}
        resolve({latitude,longitude,accuracy:Math.round(accuracy),addr,cidade,estado});
      },
      err=>reject(err.code===1?'Permissão de localização negada. Não é possível registrar o ponto.':'Não foi possível obter sua localização.'),
      {enableHighAccuracy:true,timeout:12000}
    );
  });
}

/* ============================ PERÍODO / FECHAMENTO (16 a 15) ============================ */
function periodBounds(d){
  const day=d.getDate();let start,end;
  if(day>=16){start=new Date(d.getFullYear(),d.getMonth(),16);end=new Date(d.getFullYear(),d.getMonth()+1,15);}
  else{start=new Date(d.getFullYear(),d.getMonth()-1,16);end=new Date(d.getFullYear(),d.getMonth(),15);}
  return {start,end};
}
const periodKey=b=>b.start.getFullYear()+'-'+String(b.start.getMonth()+1).padStart(2,'0');
const periodLabel=b=>b.start.toLocaleDateString('pt-BR')+' – '+b.end.toLocaleDateString('pt-BR');
const currentPeriod=()=>periodBounds(new Date());
function previousPeriod(){const c=currentPeriod();const d=new Date(c.start);d.setDate(d.getDate()-1);return periodBounds(d);}
const isPeriodClosed=(nome,b)=>(state.closedPeriods[nome]||[]).includes(periodKey(b));
function closePeriod(nome,b){const k=periodKey(b);state.closedPeriods[nome]=state.closedPeriods[nome]||[];if(!state.closedPeriods[nome].includes(k))state.closedPeriods[nome].push(k);}
function previousPeriodOpen(){
  if(!(state.role==='colab'&&state.user))return false;
  const prev=previousPeriod();
  const nome=state.user.nome;
  // Só considera "em aberto" se o colaborador REGISTROU ponto no período anterior e ainda não fechou.
  // Funcionário novo (sem registros) não é bloqueado; a contagem começa quando ele bate o primeiro ponto.
  const temAtividade=state.registros.some(r=>{
    if(r.emp!==nome||!r.data)return false;
    const dt=new Date(r.data+'T00:00:00');
    return dt>=prev.start&&dt<=prev.end;
  });
  return temAtividade&&!isPeriodClosed(nome,prev);
}
function alertPeriodoAberto(){
  const prev=previousPeriod();
  openModal({content:`<div class="modal-head"><h3>⚠️ Feche o período anterior</h3></div>
  <div class="modal-body">
    <p style="color:var(--text-2);font-size:14px;margin-top:0">O período <b>${periodLabel(prev)}</b> terminou e ainda está <b>em aberto</b>. Antes de registrar novos pontos, é necessário fechar o período anterior.</p>
    <div class="card" style="background:var(--surface-2);box-shadow:none"><div class="mini-list">
      ${infoLine('📅','Período pendente',periodLabel(prev))}
      ${infoLine('⏱️','Situação','Em aberto — aguardando seu fechamento')}

  </div>

    <button class="btn ghost" onclick="closeModal();registrarPonto(document.querySelector('.punch-btn'),true)">Registrar mesmo assim</button>
    <button class="btn primary" onclick="fecharPeriodoAnterior()">🔒 Fechar período anterior</button>

}

// Feriado cadastrado para a data (chave AAAA-MM-DD), ou null
function feriadoDe(key){return (state.holidays||[]).find(h=>h.data===key)||null;}
// Verifica se o registro do colaborador está bloqueado nesta data (domingo/feriado),
// respeitando as liberações definidas pelo administrador. Retorna {motivo,msg} ou null.
function registroBloqueado(dateKey,dow){
  const cfg=state.config||{};
  if(dow===0 && !cfg.liberarDomingo) return {motivo:'domingo',msg:'Registro aos domingos requer liberação do administrador.'};
  const h=feriadoDe(dateKey);
  if(h && !cfg.liberarFeriado && !h.liberado) return {motivo:'feriado',msg:`Registro em feriado (${h.nome}) requer liberação do administrador.`};
  return null;
}
async function registrarPonto(btn,force){
  const next=nextPunch();
  if(!next){toast('Ponto completo','Você já registrou todos os pontos de hoje.','info');return;}
  const dow=new Date().getDay();
  const bloq=registroBloqueado(todayKey(),dow);
  if(bloq){toast('Registro bloqueado',bloq.msg,'err');return;}
  if(!force&&previousPeriodOpen()){alertPeriodoAberto();return;}
  if(btn){btn.disabled=true;btn.querySelector('.lbl').textContent='Obtendo localização…';}
  try{
    const geo=await getGeo();
    const now=new Date();
    const time=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const info=deviceInfo();
    const day=myDayEnsure();
    const ip='201.9.88.'+(1+Math.floor(Math.random()*250));
    day[next]={time,geo,info,ip,at:now.toISOString()};
    state.lastGeo={...geo,...info,time,tipo:SCHED_LABEL[next]};
    // Janta: fechamento (Saída) registrado após as 18:59
    const janta = (next==='saida' && time > '18:59');
    state.registros.unshift({emp:state.user.nome,av:state.user.av,data:todayKey(),tipo:SCHED_LABEL[next],hora:time,
      lat:geo.latitude,lon:geo.longitude,addr:geo.addr,cidade:geo.cidade,estado:geo.estado,prec:geo.accuracy,ip,janta,
      disp:`${info.dev} • ${info.os} • ${info.br}`});
    pushNotif({for:'admin',ic:'📍',c:'var(--c2)',t:'Novo registro de ponto',s:`${state.user.nome} • ${SCHED_LABEL[next]} ${time} • ${geo.cidade}/${geo.estado}`});
    state.logs.unshift({quem:state.user.nome,acao:'Registrou '+SCHED_LABEL[next].toLowerCase(),
      alvo:`${time} • ${geo.latitude.toFixed(4)},${geo.longitude.toFixed(4)}`,ip:'201.9.88.3',
      hora:now.toISOString().slice(0,16).replace('T',' ')});
    if(janta){
      pushNotif({for:'admin',ic:'🍽️',c:'var(--c3)',t:'Janta registrada',s:`${state.user.nome} • saída ${time} (após 18:59)`});
      state.logs.unshift({quem:state.user.nome,acao:'Janta registrada (fechamento após 18:59)',alvo:`Saída ${time} • ${fmtd(todayKey())}`,ip:'201.9.88.3',hora:now.toISOString().slice(0,16).replace('T',' ')});
    }
    showSuccess(SCHED_LABEL[next]+' registrada!',(janta?'🍽️ Janta registrada • ':'')+`${time} • ${geo.cidade}/${geo.estado}`);
    render();
  }catch(err){
    toast('Erro ao registrar',typeof err==='string'?err:'Falha na localização.','err');
    if(btn){btn.disabled=false;render();}
  }
}

  const s=document.getElementById('success');s.classList.add('show');

/* ============================ GRÁFICOS (SVG) ============================ */
function barChart(data,{max,unit='h',color='var(--c1)',w=520,h=170}={}){
  const pad=28,bw=(w-pad*2)/data.length,mx=max||Math.max(...data.map(d=>d.v))*1.15||1;
  const bars=data.map((d,i)=>{
    const bh=(d.v/mx)*(h-pad*2),x=pad+i*bw+bw*0.22,y=h-pad-bh,bwi=bw*0.56;
    return `<g>
      <rect x="${x}" y="${y}" width="${bwi}" height="${bh}" rx="4" fill="${d.c||color}"><title>${d.l}: ${d.v}${unit}</title></rect>
      <text x="${x+bwi/2}" y="${h-pad+16}" text-anchor="middle" font-size="11" fill="var(--muted)">${d.l}</text>
      <text x="${x+bwi/2}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text-2)">${d.v?d.v+unit:''}</text>
    </g>`;}).join('');
  let grid='';for(let g=0;g<=3;g++){const y=pad+g*((h-pad*2)/3);grid+=`<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;}
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible">${grid}<line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="var(--border)" stroke-width="1.5"/>${bars}</svg>`;
}
function donut(pct,{label='',color='var(--c2)',size=150}={}){
  const r=size/2-16,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<div style="display:flex;flex-direction:column;align-items:center">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--grid)" stroke-width="14"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s"/>
      <text x="50%" y="50%" transform="rotate(90 ${size/2} ${size/2})" text-anchor="middle" dominant-baseline="middle"
        font-size="26" font-weight="800" fill="var(--text-1)">${pct}%</text>
    </svg>${label?`<div style="color:var(--muted);font-size:12.5px;margin-top:6px">${label}</div>`:''}</div>`;
}
function lineChart(data,{w=520,h=160,color='var(--c1)'}={}){
  const pad=24,mx=Math.max(...data.map(d=>d.v))*1.15||1;
  const pts=data.map((d,i)=>[pad+i*((w-pad*2)/(data.length-1)),h-pad-(d.v/mx)*(h-pad*2)]);
  const path=pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
  const area=path+` L${pts[pts.length-1][0]} ${h-pad} L${pts[0][0]} ${h-pad} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${color}"><title>${data[i].l}: ${data[i].v}</title></circle>`).join('');
  const labs=data.map((d,i)=>`<text x="${pts[i][0]}" y="${h-6}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.l}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%">
    <defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/><path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>${dots}${labs}</svg>`;
}

/* ===== Acompanhar Ponto (colaborador vê seus registros por mês) ===== */
function ymNow(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function ymLabel(ym){const [y,m]=ym.split('-').map(Number);return new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});}
function ymShift(ym,delta){let [y,m]=ym.split('-').map(Number);m+=delta;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+'-'+String(m).padStart(2,'0');}
function acompMonth(){return state.acompMonth||ymNow();}
function acompShift(delta){state.acompMonth=ymShift(acompMonth(),delta);render();}
// Monta os dias de ponto de um colaborador, JÁ aplicando os ajustes aprovados por cima.
// keep(dataISO) decide quais dias entram (mês, período, etc.)
function collectPonto(empName,keep){
  const days={};
  const tkMax=todayKey(); // nunca exibir data futura (protege contra fuso/relógio adiantado)
  // Jornada prevista do colaborador (para calcular a hora extra de cada dia)
  // Dias de semana usam a jornada normal; sábado usa a jornada reduzida (jornadaSab).
  const empObj=(state.employees||[]).find(e=>e.nome===empName);
  const jw=((empObj&&empObj.jornada)||'08:00–17:00').split(/[–-]/).map(s=>s.trim());
  const previstaWeekday=Math.max(0,(parseHM(jw[1]||'17:00')-parseHM(jw[0]||'08:00'))/60000);
  const js=((empObj&&empObj.jornadaSab)||'08:00–12:00').split(/[–-]/).map(s=>s.trim());
  const previstaSab=Math.max(0,(parseHM(js[1]||'12:00')-parseHM(js[0]||'08:00'))/60000);
  const ensure=d=>{if(!days[d])days[d]={entrada:null,saida:null,adj:false};return days[d];};
  state.registros.filter(r=>r.emp===empName&&r.data&&r.data<=tkMax&&keep(r.data)).forEach(r=>{
    const day=ensure(r.data);
    if(r.tipo==='Entrada'){if(!day.entrada)day.entrada=r.hora;}
    else if(r.tipo==='Saída'){day.saida=r.hora;}
  });
  // Ajustes aprovados/realizados corrigem ou adicionam o horário do dia
  state.adjustments.filter(a=>a.emp===empName&&(a.status==='aprovado'||a.status==='realizado')&&a.data&&a.data<=tkMax&&keep(a.data)).forEach(a=>{
    const day=ensure(a.data);
    if(a.tipo==='Entrada')day.entrada=a.para;
    else if(a.tipo==='Saída')day.saida=a.para;
    day.adj=true;
  });
  const dias=Object.keys(days).sort();
  const rows=[]; let jantas=0, extraTotalMin=0;
  dias.forEach(d=>{
    const day=days[d];
    const jantou=!!(day.saida&&day.saida>'18:59'); if(jantou)jantas++;
    let total='—', extraMin=0;
    if(day.entrada&&day.saida){
      const worked=(parseHM(day.saida)-parseHM(day.entrada))/60000;
      total=fmtMin(worked);
      const dow=new Date(d+'T12:00:00').getDay();
      let prevista=previstaWeekday;                 // seg. a sex.
      if(dow===6)prevista=previstaSab;              // sábado: jornada reduzida
      if(dow===0)prevista=0;                        // domingo: descanso -> tudo é hora extra
      if(feriadoDe(d))prevista=0;                   // feriado: tudo é hora extra
      extraMin=Math.max(0,worked-prevista);   // hora extra: o que passou da jornada prevista do dia
      extraTotalMin+=extraMin;
    }
    rows.push({data:d,entrada:day.entrada||'—',saida:day.saida||'—',total,extraMin,extra:extraMin>0?fmtMin(extraMin):'—',janta:jantou,ajustado:day.adj});
  });
  return {rows,jantas,dias:dias.length,extraTotalMin,extraTotal:fmtMin(extraTotalMin)};
}

/* conta dias corridos (inclusivo) entre duas datas ISO */
function contarDias(ini,fim){
  if(!ini||!fim)return 0;
  const a=new Date(ini+'T00:00:00'),b=new Date(fim+'T00:00:00');
  if(b<a)return -1;
  return Math.round((b-a)/86400000)+1;
}
function contarUteis(ini,fim){
  if(!ini||!fim)return 0;
  let a=new Date(ini+'T00:00:00'),b=new Date(fim+'T00:00:00'),n=0;
  if(b<a)return 0;
  const feriados=state.holidays.map(h=>h.data);
  for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){
    const dow=d.getDay();
    if(dow!==0&&dow!==6&&!feriados.includes(d.toISOString().slice(0,10)))n++;
  }
  return n;
}

function uploadPhoto(){

  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{const img=new Image();img.onload=()=>{
      const size=160,cv=document.createElement('canvas');cv.width=size;cv.height=size;
      const ctx=cv.getContext('2d'),s=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,size,size);
      setMyAvatar(cv.toDataURL('image/jpeg',0.8));toast('Foto atualizada','Upload concluído com sucesso.','info');
    };img.onerror=()=>{setMyAvatar(r.result);};img.src=r.result;};r.readAsDataURL(f);};

}

function saveEmployee(id){
  const get=x=>document.getElementById(x).value.trim();
  const jornada=(get('fJorIni')||'08:00')+'–'+(get('fJorFim')||'17:00');
  const jornadaSab=(get('fJorSabIni')||'08:00')+'–'+(get('fJorSabFim')||'12:00');
  let setor=get('fSetor'); if(setor==='__outro__')setor=get('fSetorOutro');
  let funcao=get('fFuncao'); if(funcao==='__outro__')funcao=get('fFuncaoOutro');
  const data={nome:get('fNome'),email:get('fEmail'),setor,funcao,escala:get('fEscala'),jornada,jornadaSab,status:get('fStatus')};
  const senha=get('fSenha')||'123456';
  if(!data.nome){toast('Erro','Informe o nome.','err');return;}
  if(!data.email){toast('Erro','Informe o e-mail / login do usuário.','err');return;}
  if(!setor){toast('Erro','Selecione o setor.','err');return;}
  if(!funcao){toast('Erro','Selecione a função.','err');return;}
  const dup=state.employees.find(e=>empLogin(e).toLowerCase()===data.email.toLowerCase()&&e.id!==id);
  if(dup||data.email.toLowerCase()===ADMIN_USER){toast('Login em uso','Este login não está disponível (reservado ou já usado).','err');return;}
  if(id){
    const e=state.employees.find(x=>x.id===id);
    Object.assign(e,data,{login:data.email,senha});
    state.logs.unshift({quem:'Admin',acao:'Editou funcionário / usuário',alvo:e.nome,ip:'187.12.44.9',hora:new Date().toISOString().slice(0,16).replace('T',' ')});
    closeModal();render();toast('Salvo',e.nome+' foi atualizado.','info');
  }else{
    const ini=data.nome.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const emp={id:Date.now(),banco:'+00:00',av:AV('#2563EB',ini),login:data.email,senha,
      matricula:'FN-'+String(state.employees.length+1).padStart(5,'0'),
      admissao:new Date().toLocaleDateString('pt-BR'),...data};
    state.employees.push(emp);
    state.logs.unshift({quem:'Admin',acao:'Cadastrou funcionário e criou usuário',alvo:`${emp.nome} • login: ${emp.login}`,ip:'187.12.44.9',hora:new Date().toISOString().slice(0,16).replace('T',' ')});
    closeModal();render();afterCreateUser(emp);
  }
}

  const on=tipo==='domingo'?state.config.liberarDomingo:state.config.liberarFeriado;
  state.logs.unshift({quem:'Admin',acao:(on?'Liberou':'Bloqueou')+' registro',alvo:(tipo==='domingo'?'Domingos':'Feriados'),ip:'187.12.44.9',hora:new Date().toISOString().slice(0,16).replace('T',' ')});
  saveNow();render();

// Insere um registro manual (uma batida) e reflete no painel do colaborador
function inserirPontoManual(emp,data,tipo,hora,obs){
  const janta=(tipo==='Saída'&&hora>'18:59');
  state.registros.unshift({emp:emp.nome,av:emp.av,data,tipo,hora,
    lat:null,lon:null,addr:'Ponto lançado manualmente pelo administrador'+(obs?' — '+obs:''),
    cidade:'Manual',estado:'RH',prec:0,ip:'—',janta,manual:true,
    disp:'Lançamento manual (Admin)'});
  const st=state.punchesByEmp[emp.id]||(state.punchesByEmp[emp.id]={});
  const day=st[data]||(st[data]={});
  day[tipo==='Entrada'?'entrada':'saida']={time:hora,manual:true,ip:'—',info:{dev:'Manual',os:'Admin',br:'RH'}};
}
function lancarPontoManual(){
  const gv=x=>{const el=document.getElementById(x);return el?el.value:'';};
  const empId=gv('mpEmp');
  const data=gv('mpData')||todayKey();
  const modo=gv('mpModo')||'ambos';
  const hEnt=gv('mpHoraEnt'), hSai=gv('mpHoraSai');
  const obs=(gv('mpObs')||'').trim();
  if(!empId){toast('Selecione o colaborador','Escolha para quem lançar o ponto.','err');return;}
  if(data>todayKey()){toast('Data inválida','Não é possível lançar ponto em data futura.','err');return;}
  const emp=state.employees.find(e=>String(e.id)===String(empId));
  if(!emp){toast('Colaborador não encontrado','Selecione um colaborador válido.','err');return;}
  const lancar=[];
  if(modo==='entrada'||modo==='ambos'){if(!hEnt){toast('Informe o horário de entrada','Preencha o horário de entrada.','err');return;}lancar.push(['Entrada',hEnt]);}
  if(modo==='saida'||modo==='ambos'){if(!hSai){toast('Informe o horário de saída','Preencha o horário de saída.','err');return;}lancar.push(['Saída',hSai]);}
  if(!lancar.length){toast('Nada para lançar','Escolha o que deseja lançar.','err');return;}
  if(modo==='ambos'&&hSai<=hEnt){toast('Horários inválidos','A saída precisa ser depois da entrada.','err');return;}
  lancar.forEach(([tipo,hora])=>inserirPontoManual(emp,data,tipo,hora,obs));
  const resumo=lancar.map(([t,h])=>`${t} ${h}`).join(' • ');
  pushNotif({for:'colab',ic:'➕',c:'var(--c2)',t:'Ponto lançado pelo administrador',s:`${emp.nome} • ${fmtd(data)} • ${resumo}`});
  state.logs.unshift({quem:'Admin',acao:'Abriu ponto manual',alvo:`${emp.nome} • ${fmtd(data)} • ${resumo}`,ip:'187.12.44.9',hora:new Date().toISOString().slice(0,16).replace('T',' ')});
  saveNow();render();
  toast('Ponto lançado',`${emp.nome} • ${fmtd(data)} • ${resumo}.`,'ok');
}

function excluirRegistro(i){
  const r=state.registros[i];

  openModal({content:`<div class="modal-head"><h3>🗑️ Excluir registro de ponto</h3></div>

      ${infoLine('⏱️','Registro',r.tipo+' às '+r.hora)}
    </div></div>
    <p style="color:var(--s-crit);font-size:13px;margin-top:12px">⚠️ Esta ação não pode ser desfeita.</p>
  </div>
  <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button>
  <button class="btn danger" onclick="confirmarExcluirRegistro(${i})">🗑️ Excluir registro</button></div>`});
}
function confirmarExcluirRegistro(i){
  const r=state.registros[i];
  if(!r){closeModal();return;}
  state.registros.splice(i,1);
  // Remove também da linha do tempo do colaborador (punchesByEmp)
  const emp=state.employees.find(e=>e.nome===r.emp);
  if(emp&&state.punchesByEmp[emp.id]&&state.punchesByEmp[emp.id][r.data]){
    const key=r.tipo==='Entrada'?'entrada':'saida';
    delete state.punchesByEmp[emp.id][r.data][key];
    if(!Object.keys(state.punchesByEmp[emp.id][r.data]).length)delete state.punchesByEmp[emp.id][r.data];
  }
  // Remove qualquer ajuste vinculado a esse dia/tipo, para o ponto sumir de vez do espelho e do Acompanhar
  state.adjustments=(state.adjustments||[]).filter(a=>!(a.emp===r.emp&&a.data===r.data&&a.tipo===r.tipo));
  state.logs.unshift({quem:'Admin',acao:'Excluiu registro de ponto',alvo:`${r.emp} • ${r.tipo} ${fmtd(r.data)} ${r.hora}`,ip:'187.12.44.9',hora:new Date().toISOString().slice(0,16).replace('T',' ')});
  pushNotif({for:'colab',ic:'🗑️',c:'var(--s-crit)',t:'Registro de ponto excluído',s:`${r.emp} • ${r.tipo} de ${fmtd(r.data)} às ${r.hora}`});
  saveNow();closeModal();render();
  toast('Registro excluído',`${r.emp} • ${r.tipo} ${fmtd(r.data)}.`,'err');
}

    <h1 style="color:#123a8f">transauto — ${name}</h1><p class="sub">Período 16/06 – 15/07/2026 • gerado em ${new Date().toLocaleString('pt-BR')}</p>
    <table><tr>${d.h.map(x=>`<th>${x}</th>`).join('')}</tr>
    ${d.r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></body></html>`;
}
function exportReport(name,fmt){
  const d=reportData(name),fn=name.replace(/[^\w]+/g,'_');
  if(fmt==='CSV'){
    const csv=[d.h.join(';'),...d.r.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';'))].join('\n');
    dl(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}),fn+'.csv');
  }else if(fmt==='Excel'){
    dl(new Blob([reportHTML(name,d)],{type:'application/vnd.ms-excel'}),fn+'.xls');
  }else{ printHTML(reportHTML(name,d)); }
  toast('Relatório gerado',`${name} • ${fmt}`,'info');
}
function gerarEspelho(nome){
  const quem=nome||(state.user?state.user.nome:'Colaborador');
  const dd=espelhoData(quem);
  const d={h:['Data','Entrada','Saída','Total','Janta'],
    r:dd.rows.length?dd.rows.map(r=>[fmtd(r.data)+(r.ajustado?' *':''),r.entrada,r.saida,r.total,r.janta?'Sim':'—']):[['—','—','—','Sem registros no período','—']]};
  printHTML(reportHTML('Espelho de Ponto — '+quem+' • 🍽️ Jantas: '+dd.jantas,d));
  toast('Espelho gerado','Jantas no período: '+dd.jantas+'. Use a impressão para salvar em PDF.','info');
}
function adminLogs(){
  const rows=state.logs.map(l=>`<tr><td><b>${l.quem}</b></td><td>${l.acao}</td><td>${l.alvo}</td>
    <td><code style="font-size:12px">${l.ip}</code></td><td style="white-space:nowrap">${l.hora}</td></tr>`).join('');
  return `${head('Auditoria','Trilha completa e imutável — nada é apagado.',
    `<button class="btn ghost" onclick="exportReport('Logs','CSV')">📥 Exportar</button>`)}
  <div class="card"><div class="tbl-wrap"><table>
    <thead><tr><th>Quem</th><th>Ação</th><th>Alvo / Detalhe</th><th>IP</th><th>Data / Hora</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

/* ============================ HELPERS ============================ */
function head(t,s,actions=''){return `<div class="page-head"><div><h2>${t}</h2><p>${s}</p></div>${actions?`<div class="actions">${actions}</div>`:''}</div>`;}
function kpi(ic,c,lbl,val,arg1='',arg2=''){
  let delta='';const dir=(arg1==='up'||arg1==='down')?arg1:'';
  if(dir)delta=`<span class="delta ${dir}">${dir==='up'?'▲':'▼'} ${arg2||''}</span>`;
  const sub=dir?'':(arg1||arg2);
  return `<div class="card"><div class="kpi"><div class="top"><div class="ic" style="background:${c}">${ic}</div>${delta}</div>
    <div class="val">${val}</div><div class="lbl">${lbl}</div>${sub?`<div style="color:var(--muted);font-size:12px">${sub}</div>`:''}</div></div>`;
}
function fmtd(iso){const [y,m,d]=iso.split('-');return `${d}/${m}/${y.slice(2)}`;}
function diaSemanaExt(iso){const dt=new Date(iso+'T12:00:00');return ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'][dt.getDay()];}
tick();
initPersistence();
</script>
